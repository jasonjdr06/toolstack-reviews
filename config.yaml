baseURL: "https://toolstackreviews.org/"
languageCode: "en-us"
title: "ToolStack Reviews"
theme: "PaperMod"
pagination:
  pagerSize: 10

params:
  env: production
  title: ToolStack Reviews
  description: "Honest, in-depth reviews of AI tools, SaaS platforms, and productivity software. Updated weekly."
  keywords: [AI tools, SaaS reviews, software comparison, productivity tools, best AI tools 2026]
  author: ToolStack Reviews Team
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowToc: true
  TocOpen: false
  ShowCodeCopyButtons: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "Cut through the noise. Find tools that work."
    Content: >
      We test AI tools, SaaS platforms, and productivity software so you don't have to.
      Every review is independent, hands-on, and updated for 2026.

  socialIcons:
    - name: "rss"
      url: "/index.xml"

menu:
  main:
    - identifier: ai-tools
      name: AI Tools
      url: /tags/ai-tools/
      weight: 10
    - identifier: productivity
      name: Productivity
      url: /tags/productivity/
      weight: 20
    - identifier: seo
      name: SEO Tools
      url: /tags/seo/
      weight: 30
    - identifier: categories
      name: All Reviews
      url: /categories/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true